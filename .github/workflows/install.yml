name: install

env:
  PROJECT_NAME: MaaAlibabaSupplier
  MAAFW_VERSION: "v5.10.0"
  MFAA_VERSION: ""
  BUILD_PYTHON_VERSION: "3.12"

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "agent/**"
      - "assets/**"
      - "tools/**"
      - "README.md"
      - "LICENSE"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "agent/**"
      - "assets/**"
      - "tools/**"
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set_tag
        shell: bash
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" "${{ github.ref }}" || true)
          if [[ $tag != v* ]]; then
            latest_tag=$(git tag --list "v*" --sort=-version:refname | head -n 1)
            if [[ $latest_tag != v* ]]; then
              latest_tag="v0.0.0"
            fi
            tag=$(date "+$latest_tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if [[ "$is_release" != "true" ]]; then
            prefix=${tag%-*-*}
            suffix=${tag#"$prefix"-}
            tag="$prefix-ci.$suffix"
          fi

          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
          fi

          {
            echo "tag=$tag"
            echo "is_release=$is_release"
            echo "is_prerelease=$is_prerelease"
          } >> "$GITHUB_OUTPUT"

  install:
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: win
            arch: x86_64
            runner: windows-latest
          - os: macos
            arch: x86_64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up build Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.BUILD_PYTHON_VERSION }}

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MAAFW_VERSION == '' }}
          tag: ${{ env.MAAFW_VERSION }}
          out-file-path: deps
          extract: true

      - name: Download MFAAvalonia
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'win' && 'win') || (matrix.os == 'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: ${{ env.MFAA_VERSION == '' }}
          tag: ${{ env.MFAA_VERSION }}
          out-file-path: MFA
          extract: true

      - name: Clean up MFAAvalonia archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MFAAvalonia."

      - name: Remove built-in runtime in MFA
        shell: bash
        run: |
          rm -rf MFA/runtimes

      - name: Prepare bundled Python
        id: bundled_python
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/prepare_portable_python.py \
            ${{ matrix.os }} \
            ${{ matrix.arch }} \
            .portable-python \
            --github-output "$GITHUB_OUTPUT"

      - name: Install bundled Python runtime dependencies
        shell: bash
        run: |
          python_exe="./.portable-python/${{ steps.bundled_python.outputs.python_exec_relpath }}"
          if ! "$python_exe" -m pip --version; then
            "$python_exe" -m ensurepip --upgrade
          fi
          "$python_exe" -m pip install --upgrade pip
          "$python_exe" -m pip install --upgrade --no-cache-dir --pre -r agent/requirements.txt

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements.txt

      - name: Merge MFA payload
        shell: bash
        run: |
          if [ -d "MFA" ]; then
            mkdir -p install
            shopt -s dotglob nullglob
            cp -R -n MFA/* install/
          fi

      - name: Build install payload
        shell: bash
        env:
          BUNDLED_PYTHON_DIR: .portable-python
          BUNDLED_PYTHON_EXEC_RELPATH: ${{ steps.bundled_python.outputs.python_exec_relpath }}
        run: |
          python tools/install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: install
          retention-days: 1

  changelog:
    # Disabled
    if: false
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          # 正式版：使用 tag-pattern 只匹配正式版标签，包含所有从上一个正式版以来的提交
          # 预发布版：正常生成，只包含从上一个标签以来的提交
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs:
      - meta
      - install
      - changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - shell: bash
        run: |
          cd assets
          for f in *; do
            (cd "$f" && zip -r "../$f-${{ needs.meta.outputs.tag }}.zip" .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*.zip
          tag_name: ${{ needs.meta.outputs.tag }}
          # body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

        # Mirror酱为第三方分发服务，新项目默认关闭
        # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
        # https://mirrorchyan.com/
      - name: Trigger MirrorChyanUploading
        if: false
        shell: bash
        run: |
          gh workflow run --repo "$GITHUB_REPOSITORY" mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo "$GITHUB_REPOSITORY" mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
